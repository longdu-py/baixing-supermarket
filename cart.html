<div class="container py-4">
    <h3 class="section-title">我的购物车</h3>
    <div id="cartBox"></div>
    <div class="mt-4 p-4 bg-white rounded">
        <h4>合计金额：<span class="price" id="totalPrice">0.00</span> 元</h4>
        <button class="btn btn-danger mt-2 me-2" onclick="Cart.clearAll()">清空购物车</button>
        <button class="btn btn-success mt-2">立即结算</button>
    </div>
</div>

<script>
// 渲染购物车列表
function renderCart(){
    const list = Cart.getCart();
    const box = document.getElementById("cartBox");
    const totalDom = document.getElementById("totalPrice");
    if(list.length === 0){
        box.innerHTML = "<div class='bg-white p-5 text-center'><h4>购物车暂无商品</h4><a href='goods.html' class='btn btn-danger mt-3'>去选购商品</a></div>";
        totalDom.innerText = "0.00";
        return;
    }
    let html = `<table class="table table-bordered bg-white"><tr><th>商品</th><th>单价</th><th>数量</th><th>小计</th><th>操作</th></tr>`;
    list.forEach(item=>{
        let sub = (item.price * item.num).toFixed(2);
        html += `
        <tr>
            <td><img src="${item.img}" width="80"> ${item.name}</td>
            <td>${item.price}元</td>
            <td>
                <button class="btn btn-sm btn-outline-danger" onclick="Cart.changeNum(${item.id},'minus')">-</button>
                <span class="mx-2">${item.num}</span>
                <button class="btn btn-sm btn-outline-danger" onclick="Cart.changeNum(${item.id},'plus')">+</button>
            </td>
            <td class="price">${sub}元</td>
            <td><button class="btn btn-sm btn-danger" onclick="Cart.delGoods(${item.id})">删除</button></td>
        </tr>
        `;
    })
    html += "</table>";
    box.innerHTML = html;
    totalDom.innerText = Cart.getTotalPrice();
}
window.onload = function(){
    Cart.renderCartCount();
    renderCart();
}
</script>
